<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Blocker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fff;
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 18px;
            color: #FF0000;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .toggle-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
        }

        .toggle-label {
            font-size: 14px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #FF0000;
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .status.enabled {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status.disabled {
            background-color: #ffebee;
            color: #c62828;
        }

        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px 0;
            border-top: 1px solid #eee;
        }

        .info p {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚫 Shorts Blocker</h1>
            <p>Bloquear vídeos Shorts</p>
        </div>

        <div class="toggle-section">
            <span class="toggle-label">Bloqueador ativo:</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleSwitch" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div id="status" class="status enabled">✓ Bloqueador ativo</div>

        <div class="info">
            <p>📊 Versão 1.0.0</p>
            <p>Clique para ativar/desativar o bloqueio</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
